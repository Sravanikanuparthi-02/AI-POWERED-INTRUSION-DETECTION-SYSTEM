{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow col-md-8 mx-auto">
  <h3 class="text-center">Add Network Flow Data</h3>

  <form method="POST">

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Flow Duration</label>
        <input type="number" step="any" name="flow_duration" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Total Fwd Packets</label>
        <input type="number" step="any" name="total_fwd_packets" class="form-control" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Total Backward Packets</label>
        <input type="number" step="any" name="total_backward_packets" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Flow Bytes/s</label>
        <input type="number" step="any" name="flow_bytes_s" class="form-control" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Flow Packets/s</label>
        <input type="number" step="any" name="flow_packets_s" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Fwd Packet Length Mean</label>
        <input type="number" step="any" name="fwd_pkt_len_mean" class="form-control" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Bwd Packet Length Mean</label>
        <input type="number" step="any" name="bwd_pkt_len_mean" class="form-control" required>
      </div>

      <div class="col-md-3 mb-3">
        <label>Destination Port</label>
        <input type="number" name="destination_port" class="form-control" required>
      </div>

      <div class="col-md-3 mb-3">
        <label>Protocol</label>
        <select name="protocol" class="form-control">
          <option value="6">TCP (6)</option>
          <option value="17">UDP (17)</option>
        </select>
      </div>
    </div>

    <button class="btn btn-dark w-100">Predict & Save</button>
  </form>
</div>
{% endblock %}
